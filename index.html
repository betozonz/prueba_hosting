<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titulo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #F4F2EF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #FFFFFF;
      border: 1px solid #E2DDD8;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #EDE9FE;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 22px;
    }

    .card h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      font-weight: 400;
      text-align: center;
      color: #1A1A1A;
      margin-bottom: 4px;
    }

    .card p.subtitle {
      font-size: 14px;
      color: #6B6660;
      text-align: center;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 13px;
      color: #6B6660;
      margin-bottom: 6px;
    }

    input[type="user"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #D8D3CD;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #1A1A1A;
      background: #FAFAF8;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="user"]:focus,
    input[type="password"]:focus {
      border-color: #534AB7;
      background: #FFFFFF;
    }

    .field { margin-bottom: 1rem; }

    .forgot {
      text-align: right;
      margin-top: 6px;
    }

    .forgot a {
      font-size: 12px;
      color: #534AB7;
      text-decoration: none;
    }

    .forgot a:hover { text-decoration: underline; }

    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      background: #534AB7;
      color: #EDE9FE;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover { background: #3C3489; }
    .btn:active { transform: scale(0.98); }

    .register {
      text-align: center;
      font-size: 13px;
      color: #6B6660;
      margin-top: 1.25rem;
    }

    .register a {
      color: #534AB7;
      text-decoration: none;
    }

    .register a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresa a tu cuenta para continuar</p>

    <div class="field">
      <label for="user">Usuario</label>
      <input type="user" id="user" placeholder="Ingresar usuario" />
    </div>

    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" />
      <!-- <div class="forgot"><a href="#">¿Olvidaste tu contraseña?</a></div> -->
    </div>

    <button class="btn">Iniciar sesión</button>

    <!-- <p class="register">¿No tienes cuenta? <a href="#">Regístrate</a></p> -->
  </div>
  <script>
  // Esta función se ejecuta apenas carga la página
  window.addEventListener('DOMContentLoaded', () => {
    const API_URL = 'https://pruebahostingnodejs-production.up.railway.app/usuarios';

    console.log("Intentando conectar con la base de datos...");

    fetch(API_URL)
      .then(response => {
        if (!response.ok) throw new Error('Error en la red');
        return response.json();
      })
      .then(data => {
        console.log("¡Conexión exitosa! Usuarios encontrados:", data);
        
        // Opcional: Si quieres ver el primer nombre en el título de bienvenida
        if (data.length > 0) {
          document.querySelector('h1').innerText = `Hola, ${data[0].name}`;
        }
      })
      .catch(error => {
        console.error("Hubo un problema con la conexión:", error);
      });
  });

  // Escuchar el clic del botón (Simulación de login)
  document.querySelector('.btn').addEventListener('click', () => {
    const user = document.getElementById('user').value;
    alert('Intentando ingresar con: ' + user + '. Revisa la consola (F12) para ver los datos de la BD.');
  });
</script>
</body>
</html>
